[phases.setup]
aptPkgs = [
    "libxcb1",
    "libx11-xcb1",
    "libgl1-mesa-glx",
    "libglib2.0-0"
]

[phases.install]
dependsOn = ["setup"]
cmds = [
    "python -m venv .venv",
    ".venv/bin/pip install --upgrade pip",
    ".venv/bin/pip install -r requirements.txt",
    ".venv/bin/pip uninstall -y opencv-python opencv-python-headless",
    ".venv/bin/pip install opencv-python-headless"
]

[start]
cmd = "PYTHONPATH=src .venv/bin/uvicorn src.api:app --host 0.0.0.0 --port $PORT"
